<!DOCTYPE html>
<!-- build: 2026-05-15 v2 (force redeploy after accidental rollback) -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北京租房 / 买房地图</title>

  <!-- 高德地图安全密钥（2.0 版本要求） -->
  <script>
    window._AMapSecurityConfig = {
      securityJsCode: "caf9956b9db00999b281f17c0339e1a2"
    };
  </script>
  <!-- 高德地图 JS API -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=1af01d7dc6ef58c3d0001575fcc07fc7&plugin=AMap.Geocoder,AMap.PlaceSearch,AMap.AutoComplete,AMap.Driving,AMap.Transfer,AMap.Riding"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    body { display: flex; background: #f3f4f6; overflow: hidden; }

    /* ========== 侧边栏 ========== */
    #sidebar {
      width: 360px;
      height: 100vh;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
      z-index: 10;
    }
    #sidebar header {
      padding: 18px 20px;
      border-bottom: 1px solid #f0f0f0;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: #fff;
    }
    #sidebar header h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    #sidebar header .sub { font-size: 12px; opacity: .85; }

    .toolbar {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid #f0f0f0;
      background: #fafbfc;
    }
    .btn {
      padding: 7px 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
      color: #374151;
    }
    .btn:hover { background: #f3f4f6; border-color: #9ca3af; }
    .btn.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn.primary:hover { background: #1d4ed8; }
    .btn.danger:hover { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }

    /* 模式切换 Tab */
    .mode-tabs {
      display: flex;
      background: #f3f4f6;
      padding: 4px;
      margin: 12px 16px 0;
      border-radius: 8px;
    }
    .mode-tab {
      flex: 1;
      padding: 7px 0;
      text-align: center;
      cursor: pointer;
      border-radius: 6px;
      font-size: 13px;
      color: #6b7280;
      transition: all .15s;
      font-weight: 500;
    }
    .mode-tab.active {
      background: #fff;
      color: #1f2937;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .mode-tab[data-mode="buy"].active { color: #16a34a; }
    .mode-tab[data-mode="rent"].active { color: #2563eb; }
    .mode-tab[data-mode="company"].active { color: #7c3aed; }

    .filter-row {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #f0f0f0;
      align-items: center;
    }
    .filter-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
    }
    .filter-row input:focus { outline: none; border-color: #2563eb; }

    #count-bar {
      padding: 8px 16px;
      font-size: 12px;
      color: #6b7280;
      background: #fafbfc;
      border-bottom: 1px solid #f0f0f0;
    }
    #count-bar strong { color: #2563eb; }

    #list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all .15s;
      position: relative;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover { border-color: #2563eb; box-shadow: 0 2px 8px rgba(37,99,235,.1); }

    /* ===== 长按抖动 + 左上角 × 删除 ===== */
    @keyframes card-wiggle {
      0%   { transform: rotate(-1.2deg); }
      50%  { transform: rotate(1.2deg); }
      100% { transform: rotate(-1.2deg); }
    }
    .card.wiggle {
      animation: card-wiggle .22s ease-in-out infinite;
      transform-origin: 50% 50%;
      border-color: #fca5a5;
      box-shadow: 0 4px 14px rgba(239,68,68,.18);
    }
    .card .del-x {
      display: none;
      position: absolute;
      top: -8px;
      left: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ef4444;
      color: #fff;
      font-size: 16px;
      line-height: 24px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      z-index: 10;
      border: 2px solid #fff;
      animation: card-wiggle .22s ease-in-out infinite reverse; /* 与卡片反相,视觉上更"颤" */
    }
    .card.wiggle .del-x { display: block; }
    .card .del-x:active { background: #dc2626; transform: scale(.92); }
    .card .title { font-weight: 600; font-size: 14px; color: #1f2937; margin-bottom: 4px; }
    .card .price { color: #ef4444; font-size: 16px; font-weight: 700; }
    .card .price small { font-size: 11px; color: #6b7280; font-weight: normal; }
    .card .meta { font-size: 12px; color: #6b7280; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
    .card .meta span { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }
    .card .addr { font-size: 11px; color: #9ca3af; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .empty { text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 13px; }

    /* ========== 地图 ========== */
    #map {
      flex: 1;
      height: 100vh;
      position: relative;
    }

    #tip {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(31,41,55,.92);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 5;
      pointer-events: none;
      transition: opacity .3s;
    }

    /* ========== 地图搜索框 ========== */
    #map-search {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 360px;
      max-width: calc(100% - 32px);
      z-index: 6;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      overflow: hidden;
    }
    #map-search .input-wrap {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 44px;
      gap: 8px;
    }
    #map-search .icon-search {
      flex-shrink: 0;
      width: 18px; height: 18px;
      opacity: .55;
    }
    #map-search input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
      color: #1f2937;
      height: 100%;
    }
    #map-search input::placeholder { color: #9ca3af; }
    #map-search .clear-btn {
      cursor: pointer;
      color: #9ca3af;
      font-size: 18px;
      padding: 4px 6px;
      line-height: 1;
      border-radius: 50%;
      display: none;
    }
    #map-search .clear-btn:hover { background: #f3f4f6; color: #374151; }
    #map-search.has-text .clear-btn { display: block; }

    #search-results {
      max-height: 360px;
      overflow-y: auto;
      border-top: 1px solid #f0f0f0;
      display: none;
    }
    #search-results.show { display: block; }
    .sr-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      transition: background .12s;
    }
    .sr-item:last-child { border-bottom: none; }
    .sr-item:hover, .sr-item.active { background: #eff6ff; }
    .sr-item .sr-name {
      font-size: 14px;
      color: #1f2937;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sr-item .sr-name b { color: #2563eb; font-weight: 600; }
    .sr-item .sr-addr {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sr-item .sr-district {
      display: inline-block;
      font-size: 11px;
      color: #2563eb;
      background: #eff6ff;
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .sr-empty {
      padding: 16px;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
    }
    .sr-loading {
      padding: 12px;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
    }

    /* 搜索结果临时标记的气泡 */
    .search-pin-popup {
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      min-width: 200px;
      max-width: 260px;
    }
    .search-pin-popup .pp-name { font-weight: 600; font-size: 14px; color: #1f2937; margin-bottom: 4px; }
    .search-pin-popup .pp-addr { font-size: 12px; color: #6b7280; margin-bottom: 8px; line-height: 1.4; }
    .search-pin-popup .pp-actions { display: flex; gap: 6px; }
    .search-pin-popup .pp-actions .btn { flex: 1; font-size: 12px; padding: 6px 8px; }

    /* ========== 模态弹窗 ========== */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-mask.show { display: flex; }
    .modal {
      background: #fff;
      width: 480px;
      max-height: 90vh;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal h2 {
      padding: 16px 20px;
      font-size: 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal h2 .close { cursor: pointer; color: #9ca3af; font-size: 22px; line-height: 1; }
    .modal h2 .close:hover { color: #374151; }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .form-row input, .form-row textarea, .form-row select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
      outline: none; border-color: #2563eb;
    }
    .form-row textarea { resize: vertical; min-height: 60px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .img-uploader {
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      color: #6b7280;
      font-size: 13px;
      transition: all .15s;
    }
    .img-uploader:hover { border-color: #2563eb; color: #2563eb; }
    .img-uploader.dragover {
      border-color: #2563eb;
      background: #eff6ff;
      color: #2563eb;
    }
    .img-uploader .hint {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .img-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .img-preview .img-item {
      position: relative;
      width: 70px;
      height: 70px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    .img-preview img { width: 100%; height: 100%; object-fit: cover; }
    .img-preview .img-item video { width: 100%; height: 100%; object-fit: cover; background: #000; }
    .img-preview .img-item .vbadge {
      position: absolute;
      bottom: 2px; left: 2px;
      background: rgba(0,0,0,.65);
      color: #fff;
      font-size: 10px;
      padding: 1px 4px;
      border-radius: 3px;
      pointer-events: none;
    }
    .img-preview .del {
      position: absolute;
      top: 2px; right: 2px;
      width: 18px; height: 18px;
      background: rgba(0,0,0,.6);
      color: #fff;
      border-radius: 50%;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .modal-mask.company-mode .rental-only { display: none !important; }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: #fafbfc;
    }

    /* InfoWindow 样式 */
    .info-card { width: 280px; max-width: 280px; }
    .info-card .info-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; color: #1f2937; }
    .info-card .info-price { color: #ef4444; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .info-card .info-price small { font-size: 12px; color: #6b7280; font-weight: normal; }
    .info-card .info-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .info-card .info-meta span { background: #f3f4f6; padding: 2px 8px; border-radius: 4px; font-size: 12px; color: #4b5563; }
    .info-card .info-addr { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
    .info-card .info-desc { font-size: 13px; color: #374151; margin-bottom: 8px; line-height: 1.5; max-height: 80px; overflow-y: auto; }
    .info-card .info-contact { font-size: 12px; color: #2563eb; margin-bottom: 8px; }
    .info-card .info-imgs { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 8px; }
    .info-card .info-imgs img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; cursor: pointer; }
    .info-card .info-videos { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .info-card .info-videos video { width: 100%; max-height: 180px; background: #000; border-radius: 6px; }
    .info-card .info-videos a { font-size: 12px; color: #2563eb; word-break: break-all; }
    .info-card .info-actions-wrap {
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }
    .info-card .info-more-btn {
      width: 100%;
      font-size: 13px;
      padding: 9px;
      color: #6b7280;
      letter-spacing: .08em;
      transition: opacity .15s;
    }
    .info-card .info-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .info-card .info-actions .btn {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 12px;
      padding: 8px 6px;
      font-weight: 500;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    /* 导航按钮:主色调蓝 */
    .info-card .info-actions .btn-nav {
      background: linear-gradient(135deg,#2563eb,#1e40af);
      color: #fff;
      border-color: #1e40af;
      box-shadow: 0 1px 3px rgba(37,99,235,.3);
    }
    .info-card .info-actions .btn-nav:hover { background: linear-gradient(135deg,#1e40af,#1e3a8a); }
    /* 加入路线按钮:橙色 */
    .info-card .info-actions .btn-pin {
      background: #fff7ed;
      color: #c2410c;
      border-color: #fdba74;
    }
    .info-card .info-actions .btn-pin.pinned {
      background: #16a34a;
      color: #fff;
      border-color: #15803d;
    }
    .info-card .info-actions .btn-pin:hover { background: #fed7aa; border-color: #fb923c; }
    .info-card .info-actions .btn-pin.pinned:hover { background: #15803d; }

    /* 大图预览 */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

    /* ========== 抽屉切换按钮（仅手机显示） ========== */
    #drawer-toggle {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      width: 44px; height: 44px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      border: none;
    }

    /* ========== 手机响应式 ========== */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 88vw;
        max-width: 360px;
        height: 100vh;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform .25s ease-out;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar::after {
        content: "";
        position: fixed;
        inset: 0 0 0 88vw;
        background: rgba(0,0,0,.4);
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s;
      }
      #sidebar.open::after { opacity: 1; pointer-events: auto; }

      #map { width: 100vw; height: 100vh; }
      #drawer-toggle { display: flex; }

      /* 地图搜索框给抽屉按钮让位 */
      #map-search { width: calc(100% - 80px); top: 16px; left: 16px; }

      /* 弹窗占满屏 */
      .modal { width: 95vw; max-height: 92vh; border-radius: 8px; }
      .modal-body { padding: 14px; }
      .toolbar { gap: 6px; padding: 10px 12px; }
      .btn { font-size: 12px; padding: 6px 10px; }

      /* InfoWindow 内的视频别太大 */
      .info-card { width: 76vw; max-width: 320px; }

      /* 多点路线面板手机端:固定在底部、整宽、圆角顶 */
      #route-panel, #commute-panel {
        bottom: 0 !important;
        right: 0 !important;
        left: 0 !important;
        width: auto !important;
        border-radius: 18px 18px 0 0 !important;
        max-height: 60vh;
        box-shadow: 0 -4px 20px rgba(0,0,0,.18) !important;
      }
      /* 抓手:视觉上提示能下拉关闭 */
      #route-panel::before, #commute-panel::before {
        content: "";
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 38px;
        height: 4px;
        border-radius: 4px;
        background: rgba(255,255,255,.6);
        pointer-events: none;
      }
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <header>
    <h1 id="app-title">🏠 北京租房地图</h1>
    <div class="sub" id="app-sub">点击地图任意位置添加房源</div>
  </header>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="rent">🏠 租房</div>
    <div class="mode-tab" data-mode="buy">🏡 买房</div>
    <div class="mode-tab" data-mode="company">🏢 公司</div>
  </div>

  <div class="toolbar">
    <button class="btn primary" id="btn-add">＋ 在地图上添加</button>
    <button class="btn" id="btn-export">导出 JSON</button>
    <button class="btn" id="btn-import">导入 JSON</button>
    <button class="btn danger" id="btn-clear">清空全部</button>
    <input type="file" id="file-import" accept="application/json" style="display:none" />
  </div>

  <div class="filter-row">
    <input type="text" id="search" placeholder="搜索小区/地址/描述..." />
    <input type="number" id="price-max" placeholder="最高价" style="width:80px" />
  </div>

  <div id="count-bar">共 <strong id="count">0</strong> 条房源</div>

  <div id="list"></div>
</aside>

<div id="map">
  <div id="map-search">
    <div class="input-wrap">
      <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="search-input" placeholder="搜索小区、地点、地铁站..." autocomplete="off" />
      <span class="clear-btn" id="search-clear">×</span>
    </div>
    <div id="search-results"></div>
    <div id="search-loc-bar" style="display:none;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid #f0f0f0;background:#f9fafb">
      <div style="flex:1;min-width:0">
        <div id="search-loc-name" style="font-size:13px;font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>

<script>
/* ========================================================
 *  数据层 — Cloudflare Pages Functions (D1) + Cloudinary
 *  · 房源元数据走 /api/rentals (Cloudflare D1)
 *  · 媒体（图片/视频）直接上传到 Cloudinary，rentals 里只存返回的 https URL
 *
 *  ⚠️ 部署前编辑下面 CLOUDINARY 两个值（注册 Cloudinary 后能拿到）：
 *     1. 在 https://cloudinary.com 注册（免费，不要信用卡）
 *     2. Dashboard 顶部能看到 Cloud Name，复制填入 cloudName
 *     3. Settings → Upload → Add upload preset → Signing Mode 选 "Unsigned"
 *        → 取个名字（如 bj-housing），保存后填入 uploadPreset
 * ======================================================== */
const CLOUDINARY = {
  cloudName: "dypkzqyzk",       // ← 改成你的 Cloud Name
  uploadPreset: "bj-housing",    // ← 改成你的 unsigned upload preset 名
};
const API_BASE = "/api";
let currentMode = localStorage.getItem("bj_mode") || "rent";  // "rent" | "buy" | "company"

const _modeCache = { rent: null, buy: null, company: null };

async function loadMode(mode) {
  if (_modeCache[mode]) return _modeCache[mode].slice();
  const r = await fetch(`${API_BASE}/rentals?mode=${mode}`);
  if (!r.ok) throw new Error(`加载失败 (${r.status})`);
  const arr = await r.json();
  _modeCache[mode] = arr;
  return arr.slice();
}
function invalidateModeCache(mode) { _modeCache[mode] = null; }

async function loadAll() { return await loadMode(currentMode); }

async function apiUpsert(rental) {
  const r = await fetch(`${API_BASE}/rentals`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ...rental, mode: currentMode }),
  });
  if (!r.ok) throw new Error(`保存失败 (${r.status})`);
  invalidateModeCache(currentMode);
  return await r.json();
}

async function apiDelete(id) {
  const r = await fetch(`${API_BASE}/rentals/${encodeURIComponent(id)}`, { method: "DELETE" });
  if (!r.ok) throw new Error(`删除失败 (${r.status})`);
  invalidateModeCache(currentMode);
}

/* —— 媒体上传：浏览器直接 POST 到 Cloudinary —— */
async function mediaUpload(blob, mimeType) {
  if (!CLOUDINARY.cloudName || !CLOUDINARY.uploadPreset) {
    throw new Error("尚未配置 Cloudinary（请编辑 index.html 顶部的 CLOUDINARY 常量）");
  }
  const fd = new FormData();
  fd.append("file", blob);
  fd.append("upload_preset", CLOUDINARY.uploadPreset);
  // /auto/upload 让 Cloudinary 自动识别图片/视频/原始文件
  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/auto/upload`, {
    method: "POST",
    body: fd,
  });
  if (!r.ok) {
    let err;
    try { err = await r.json(); } catch(_) {}
    throw new Error((err && err.error && err.error.message) || `上传失败 (${r.status})`);
  }
  const j = await r.json();
  return j.secure_url;  // 直接拿 https URL 当 ref 存
}

// 是否是"我们上传"的媒体（用于 UI 区分本地 vs 外链徽标）
function isOurMedia(ref) {
  return typeof ref === "string" && (
    ref.includes("res.cloudinary.com") ||
    ref.startsWith("r2:") ||      // 兼容老数据
    ref.startsWith("idb:") ||
    ref.startsWith("data:")
  );
}

// 引用 → 真实 URL（用于 <img src> / <video src>）
function refToURL(ref) {
  if (!ref || typeof ref !== "string") return "";
  if (ref.startsWith("r2:")) return `${API_BASE}/media/${encodeURIComponent(ref.slice(3))}`;  // 老数据兼容
  // data: / http(s): / cloudinary URL —— 全部原样返回
  return ref;
}

// 解析容器内所有 [data-ref] 元素的 src
function resolveRefsIn(rootEl) {
  if (!rootEl) return;
  rootEl.querySelectorAll("[data-ref]").forEach(el => {
    const url = refToURL(el.dataset.ref);
    if (!url) return;
    if (el.tagName === "IMG" || el.tagName === "VIDEO" || el.tagName === "SOURCE") el.src = url;
  });
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

let rentals = [];   // 当前模式数据，applyMode 时拉取填充
let commuteCompanies = [];  // [{id, lng, lat, name}] — hoisted, populated later

/* ===== 旧的 IndexedDB / localStorage 代码已删除（替换为云端 API） ===== */

let map, geocoder;
let markers = {};      // id -> AMap.Marker
let infoWindow;
let pendingLngLat = null;  // 添加模式下，点击地图时记录位置

/* ========================================================
 *  地图初始化
 * ======================================================== */
function initMap() {
  map = new AMap.Map("map", {
    zoom: 11,
    center: [116.397428, 39.90923],   // 天安门
    viewMode: "2D",
    mapStyle: "amap://styles/normal"
  });

  geocoder = new AMap.Geocoder({ city: "北京" });
  infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -32), closeWhenClickMap: true });
  infoWindow.on('close', () => {
    document.querySelectorAll('.info-card video').forEach(v => { try { v.pause(); } catch(e) {} });
  });

  map.on("click", onMapClick);
  map.on("click", () => { document.getElementById("search-loc-bar").style.display = "none"; });

  // 初始化搜索功能
  initSearch();

  // 应用当前模式（会读对应数据 + 画 marker + 渲染列表）
  applyMode();
}

/* ========================================================
 *  地图搜索 — AutoComplete + PlaceSearch
 * ======================================================== */
let autoComplete, placeSearch, searchMarker;
let searchDebounceTimer = null;
let lastSearchTips = [];
let activeIndex = -1;

function initSearch() {
  autoComplete = new AMap.AutoComplete({ city: "北京", citylimit: true });
  placeSearch = new AMap.PlaceSearch({ city: "北京", citylimit: true, pageSize: 10 });

  const input = $("search-input");
  const wrap = $("map-search");
  const clearBtn = $("search-clear");
  const results = $("search-results");

  input.addEventListener("input", () => {
    const kw = input.value.trim();
    if (kw) wrap.classList.add("has-text"); else wrap.classList.remove("has-text");
    if (!kw) {
      hideResults();
      return;
    }
    // 防抖 300ms
    clearTimeout(searchDebounceTimer);
    showResults(`<div class="sr-loading">搜索中...</div>`);
    searchDebounceTimer = setTimeout(() => doAutoComplete(kw), 300);
  });

  // Enter / 上下键
  input.addEventListener("keydown", (e) => {
    if (!results.classList.contains("show") || !lastSearchTips.length) {
      if (e.key === "Enter" && input.value.trim()) {
        // 没下拉时直接 PlaceSearch 第一条
        doDirectSearch(input.value.trim());
      }
      return;
    }
    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeIndex = (activeIndex + 1) % lastSearchTips.length;
      highlightResult();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIndex = (activeIndex - 1 + lastSearchTips.length) % lastSearchTips.length;
      highlightResult();
    } else if (e.key === "Enter") {
      e.preventDefault();
      const idx = activeIndex >= 0 ? activeIndex : 0;
      pickTip(lastSearchTips[idx]);
    } else if (e.key === "Escape") {
      hideResults();
      input.blur();
    }
  });

  clearBtn.addEventListener("click", () => {
    input.value = "";
    wrap.classList.remove("has-text");
    hideResults();
    clearSearchMarker();
    input.focus();
  });

  // 失焦时延迟关闭（防止点击下拉时来不及触发）
  input.addEventListener("blur", () => {
    setTimeout(hideResults, 180);
  });
  input.addEventListener("focus", () => {
    if (lastSearchTips.length) showResults(renderTips(lastSearchTips, input.value.trim()));
  });
}

function doAutoComplete(kw) {
  autoComplete.search(kw, (status, result) => {
    if (status === "complete" && result.tips && result.tips.length) {
      // 过滤掉没有坐标的（行政区结果）
      const tips = result.tips.filter(t => t.location && typeof t.location.lng === "number");
      if (!tips.length) {
        showResults(`<div class="sr-empty">未找到匹配地点</div>`);
        lastSearchTips = [];
        return;
      }
      lastSearchTips = tips;
      activeIndex = -1;
      showResults(renderTips(tips, kw));
    } else {
      lastSearchTips = [];
      showResults(`<div class="sr-empty">未找到匹配地点</div>`);
    }
  });
}

function doDirectSearch(kw) {
  placeSearch.search(kw, (status, result) => {
    if (status === "complete" && result.poiList && result.poiList.pois.length) {
      const p = result.poiList.pois[0];
      flyToAndPin({
        name: p.name,
        addr: p.address || (p.pname + p.cityname + p.adname),
        district: p.adname,
        lng: p.location.lng,
        lat: p.location.lat
      });
    } else {
      showTip("没有找到该地点", 2000);
    }
  });
}

function renderTips(tips, kw) {
  return tips.map((t, i) => {
    const name = highlightKeyword(t.name || "", kw);
    const district = t.district || "";
    const addr = t.address || "";
    return `
      <div class="sr-item" data-i="${i}">
        <div class="sr-name">${name}</div>
        <div class="sr-addr">
          ${district ? `<span class="sr-district">${escapeHtml(district)}</span>` : ""}
          ${escapeHtml(addr)}
        </div>
      </div>
    `;
  }).join("");
}

function highlightKeyword(text, kw) {
  if (!kw) return escapeHtml(text);
  const safeText = escapeHtml(text);
  const safeKw = escapeHtml(kw);
  // 简单包裹，不区分大小写
  const re = new RegExp(safeKw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
  return safeText.replace(re, m => `<b>${m}</b>`);
}

function showResults(html) {
  const results = $("search-results");
  results.innerHTML = html;
  results.classList.add("show");
  // 绑定点击
  results.querySelectorAll(".sr-item").forEach(el => {
    el.addEventListener("mousedown", (e) => {
      e.preventDefault(); // 阻止 input 失焦
      const i = parseInt(el.dataset.i);
      pickTip(lastSearchTips[i]);
    });
  });
}

function hideResults() {
  $("search-results").classList.remove("show");
  activeIndex = -1;
}

function highlightResult() {
  const items = document.querySelectorAll(".sr-item");
  items.forEach((el, i) => {
    el.classList.toggle("active", i === activeIndex);
    if (i === activeIndex) el.scrollIntoView({ block: "nearest" });
  });
}

function pickTip(tip) {
  if (!tip || !tip.location) return;
  const lng = typeof tip.location.lng === "number" ? tip.location.lng : tip.location.getLng();
  const lat = typeof tip.location.lat === "number" ? tip.location.lat : tip.location.getLat();
  flyToAndPin({
    name: tip.name,
    addr: tip.address || tip.district || "",
    district: tip.district || "",
    lng, lat
  });
  $("search-input").value = tip.name;
  $("map-search").classList.add("has-text");
  hideResults();
  $("search-input").blur();
}

function flyToAndPin(loc) {
  clearSearchMarker();
  map.setZoomAndCenter(16, [loc.lng, loc.lat]);
  window._searchPinData = loc;
  // 显示页面内悬浮条（不用 AMap InfoWindow 避免蓝色锚点）
  const bar = document.getElementById("search-loc-bar");
  document.getElementById("search-loc-name").textContent = loc.name;
  document.getElementById("search-loc-addr").textContent = loc.addr || "";
  document.getElementById("search-loc-btn").textContent =
    "＋ 在此添加" + (currentMode === "company" ? "公司" : "房源");
  bar.style.display = "flex";
}

window.clearSearchMarker = function() {
  if (searchMarker) { searchMarker.setMap(null); searchMarker = null; }
  document.getElementById("search-loc-bar").style.display = "none";
  window._searchPinData = null;
};

window.addRentalAtSearchPin = function() {
  const loc = window._searchPinData;
  if (!loc) return;
  if (window.searchInfoWindow) window.searchInfoWindow.close();
  // 用搜索结果的位置和名称预填表单
  openModal(null, {
    lng: loc.lng,
    lat: loc.lat,
    addr: loc.addr || ""
  });
  // 顺手把名称塞到标题里
  if (!$("f-title").value) $("f-title").value = loc.name || "";
};

// 地图点击防抖锁：InfoWindow 内按钮操作后短暂屏蔽地图点击，防止误触
let _mapClickLocked = false;
window.lockMapClick = function(ms = 400) {
  _mapClickLocked = true;
  clearTimeout(window.lockMapClick._t);
  window.lockMapClick._t = setTimeout(() => { _mapClickLocked = false; }, ms);
};

function onMapClick(e) {
  if (_mapClickLocked) return;   // 被 InfoWindow 按钮操作锁住时忽略
  // 手机端：如果 InfoWindow 当前是打开的，第一次点地图只关闭窗口不弹表单
  if (infoWindow && infoWindow.getIsOpen && infoWindow.getIsOpen()) {
    infoWindow.close();
    lockMapClick(300);
    return;
  }
  const lng = e.lnglat.getLng();
  const lat = e.lnglat.getLat();
  pendingLngLat = { lng, lat };
  // 反查地址
  geocoder.getAddress([lng, lat], (status, result) => {
    let addr = "";
    if (status === "complete" && result.regeocode) {
      addr = result.regeocode.formattedAddress;
    }
    openModal(null, { lng, lat, addr });
  });
}

/* ========================================================
 *  Marker
 * ======================================================== */
// 按 title 分组（trim 后相同视为同一栋）
function groupKeyOf(r) { return (r.title || "").trim() || r.id; }
function getGroups() {
  const groups = new Map();
  rentals.forEach(r => {
    const k = groupKeyOf(r);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(r);
  });
  return groups;
}

function buildCompanyMarkerContent(title) {

let _infoState = null;  // { key, idx } —— InfoWindow 当前同名组分页状态

function showInfo(id) {
  const r0 = rentals.find(x => x.id === id);
  if (!r0) return;
  const key = groupKeyOf(r0);
  const arr = rentals.filter(x => groupKeyOf(x) === key);
  const idx = Math.max(0, arr.findIndex(x => x.id === id));
  showGroupInfo(key, idx, arr);

function showGroupInfo(key, idx, _arr) {
  const arr = _arr || rentals.filter(x => groupKeyOf(x) === key);
  if (!arr.length) return;
  idx = ((idx % arr.length) + arr.length) % arr.length;  // 支持环形翻页
  _infoState = { key, idx };
  const r = arr[idx];
  const isBuy = currentMode === "buy";
  // 在另一模式中找同名条目，合并展示（用内存缓存，没缓存则跳过；模式切换时会预热）
  const otherMode = isBuy ? "rent" : "buy";
  const otherArr = _modeCache[otherMode] || [];
  const other = otherArr.find(x => (x.title || "").trim() === (r.title || "").trim());

  const priceHtml = isBuy
    ? `<div class="info-price" style="color:#16a34a">${r.price} <small>万元</small>${r.unitPrice ? ` <small style="color:#6b7280">· 单价 ${r.unitPrice} 元/m²</small>` : ""}</div>`
    : `<div class="info-price">¥${r.price} <small>/月</small></div>`;

  // 另一模式的同名信息块
  let otherHtml = "";
  if (other) {
    const otherIsBuy = otherMode === "buy";
    const otherPrice = otherIsBuy
      ? `<span style="color:#16a34a;font-weight:600">${other.price} 万${other.unitPrice ? ` <small style="color:#6b7280;font-weight:normal">· ${other.unitPrice}元/m²</small>` : ""}</span>`
      : `<span style="color:#ef4444;font-weight:600">¥${other.price} /月</span>`;
    otherHtml = `
      <div style="background:#f9fafb;border:1px solid #e5e7eb;border-left:3px solid ${otherIsBuy ? "#16a34a" : "#ef4444"};border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:12px">
        <div style="color:#6b7280;margin-bottom:3px">同时${otherIsBuy ? "在售" : "在租"}：</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          ${otherPrice}
          <button class="btn" style="font-size:11px;padding:3px 8px" onclick="switchToOther('${otherMode}','${other.id}')">查看 →</button>
        </div>
      </div>
    `;
  }

  // 同名翻页器（>1 时显示）
  const pager = arr.length > 1 ? `

      <button class="btn" style="padding:2px 10px;font-size:13px;line-height:1.4" onclick="infoNext()">›</button>
    </div>
  ` : "";

  const html = `
    <div class="info-card" id="info-card-root">
      ${pager}
      <div class="info-title">${escapeHtml(r.title)}${other ? ` <span style="font-size:11px;color:${isBuy ? "#ef4444" : "#16a34a"};background:${isBuy ? "#fef2f2" : "#f0fdf4"};padding:1px 6px;border-radius:4px;font-weight:normal;vertical-align:middle">${isBuy ? "也在租" : "也在售"}</span>` : ""}</div>
      ${priceHtml}
      ${otherHtml}
      <div class="info-meta">
        ${r.layout ? `<span>${escapeHtml(r.layout)}</span>` : ""}
        ${r.area ? `<span>${r.area}m²</span>` : ""}
        ${r.orient ? `<span>${escapeHtml(r.orient)}</span>` : ""}
      </div>
      ${r.addr ? `<div class="info-addr">📍 ${escapeHtml(r.addr)}</div>` : ""}
      ${r.desc ? `<div class="info-desc">${escapeHtml(r.desc)}</div>` : ""}
      ${r.contact ? `<div class="info-contact">📞 ${escapeHtml(r.contact)}</div>` : ""}
      ${r.images && r.images.length ? `<div class="info-imgs">${r.images.map((src,i)=>`<img data-ref="${escapeHtml(src)}" data-img="${i}" data-id="${r.id}" />`).join("")}</div>` : ""}
      ${r.videos && r.videos.length ? `<div class="info-videos">${r.videos.map(src => renderVideoEntry(src)).join("")}</div>` : ""}
      <div class="info-actions-wrap">
        <button class="btn info-more-btn" id="info-more-btn"
          data-id="${r.id}" data-lng="${r.lng}" data-lat="${r.lat}" data-title="${escapeHtml(r.title)}"
          onclick="window.expandInfoActions(this)">⋯ 更多操作</button>

      img.onclick = () => { if (img.src) showLightbox(img.src); };
    });
    if (arr.length > 1 && root) bindSwipe(root);
    // 方案一：延迟 400ms 激活 ⋯ 按钮，防止 marker 点击的幻影触发
    const moreBtn = root?.querySelector('#info-more-btn');
    if (moreBtn) {
      moreBtn.style.pointerEvents = 'none';
      moreBtn.style.opacity = '0.4';
      setTimeout(() => { moreBtn.style.pointerEvents = ''; moreBtn.style.opacity = ''; }, 400);

// 渲染 InfoWindow 中的单个视频条目（本地 base64 / 直链 mp4 / B站 / YouTube / 通用外链）
function renderVideoEntry(src) {
  if (!src) return "";
  // 我们上传的媒体（Cloudinary / R2 / 旧数据）走 data-ref
  if (isOurMedia(src)) {
    return `<video data-ref="${escapeHtml(src)}" controls preload="metadata"></video>`;
  }
  // 直链 mp4 / webm 等
  if (/\.(mp4|webm|ogg|mov|m4v)(\?.*)?$/i.test(src)) {
    return `<video src="${escapeHtml(src)}" controls preload="metadata"></video>`;
  }
  // YouTube
  let m = src.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{6,})/i);
  if (m) {
    return `<iframe src="https://www.youtube.com/embed/${m[1]}" style="width:100%;aspect-ratio:16/9;border:0;border-radius:6px" allowfullscreen></iframe>`;
  }
  // B站
  m = src.match(/bilibili\.com\/video\/(BV[\w]+|av\d+)/i);
  if (m) {
    const id = m[1];
    const param = id.startsWith("BV") ? `bvid=${id}` : `aid=${id.slice(2)}`;
    return `<iframe src="//player.bilibili.com/player.html?${param}&high_quality=1" style="width:100%;aspect-ratio:16/9;border:0;border-radius:6px" scrolling="no" allowfullscreen></iframe>`;
  }
  // 兜底：给一个跳转链接
  return `<a href="${escapeHtml(src)}" target="_blank" rel="noopener">▶ 打开视频链接：${escapeHtml(src)}</a>`;
}

// 切页函数（环形）
window.infoPrev = function() {
  if (!_infoState) return;
  showGroupInfo(_infoState.key, _infoState.idx - 1);
};
window.infoNext = function() {
  if (!_infoState) return;
  showGroupInfo(_infoState.key, _infoState.idx + 1);
};

// 触摸滑动翻页
function bindSwipe(el) {
  let sx = 0, sy = 0, t = 0;
  el.addEventListener("touchstart", e => {
    const p = e.changedTouches[0];
    sx = p.clientX; sy = p.clientY; t = Date.now();
  }, { passive: true });
  el.addEventListener("touchend", e => {
    const p = e.changedTouches[0];
    const dx = p.clientX - sx, dy = p.clientY - sy;
    if (Date.now() - t > 600) return;
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
    if (dx < 0) window.infoNext(); else window.infoPrev();
  }, { passive: true });
}

// 键盘左右键翻页（InfoWindow 打开且不在输入框内时）
document.addEventListener("keydown", e => {
  if (!_infoState) return;
  if (modal.classList.contains("show")) return;
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA")) return;
  if (e.key === "ArrowLeft") { e.preventDefault(); window.infoPrev(); }
  else if (e.key === "ArrowRight") { e.preventDefault(); window.infoNext(); }
});

// 把一批文件上传到云端 R2；图片先压缩，视频原样上传
async function ingestImageFiles(files) {
  const all = Array.from(files || []).filter(f => f && (f.type.startsWith("image/") || f.type.startsWith("video/")));
  if (!all.length) return;
  showTip(`正在上传 ${all.length} 个文件...`, 60000);
  for (const f of all) {
    try {
      const isVideo = f.type.startsWith("video/");
      let blob, mime;
      if (isVideo) {
        blob = f;  // 视频不压缩
        mime = f.type;
      } else {
        blob = await compressImage(f, 1600, 0.82);
        mime = "image/jpeg";
      }
      const ref = await mediaUpload(blob, mime);
      if (isVideo) editingVideos.push(ref);
      else editingImages.push(ref);
      renderImgPreview();
    } catch(e) {
      console.error("媒体上传失败", e);
      alert(`文件 "${f.name}" 上传失败：${e.message || e}`);
    }
  }
  showTip(`已上传 ${all.length} 个文件`, 1500);
}

/* —— 粘贴上传：弹窗打开时监听全局 paste —— */
document.addEventListener("paste", e => {
  if (!modal.classList.contains("show")) return;
  // 若焦点在文本输入且剪贴板有文字，让浏览器正常粘贴文字
  const ae = document.activeElement;
  const isTextInput = ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA");
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  const files = [];
  for (const it of items) {
    if (it.kind === "file" && it.type.startsWith("image/")) {
      const f = it.getAsFile();
      if (f) files.push(f);
    }
  }
  if (!files.length) return;
  // 有图片 → 拦截默认（防止 textarea 粘上文件名等）
  if (!isTextInput || !e.clipboardData.getData("text")) e.preventDefault();
  ingestImageFiles(files);
  showTip(`已粘贴 ${files.length} 张图片`, 1500);
});

// 返回 Blob（不再返回 dataURL，省 1/3 体积、且能直接进 IDB）
function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxSize) {
          height = height * maxSize / width; width = maxSize;
        } else if (height > maxSize) {
          width = width * maxSize / height; height = maxSize;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        canvas.toBlob(b => b ? resolve(b) : reject(new Error("toBlob 失败")), "image/jpeg", quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ===== 列表卡片交互:点击查看 / 长按抖动 / 点 × 删除 ===== */
let _wiggleTimer = null;
let _wigglingCard = null;
function exitWiggle() {
  if (_wigglingCard) {
    _wigglingCard.classList.remove("wiggle");
    _wigglingCard = null;
  }
  if (_wiggleTimer) { clearTimeout(_wiggleTimer); _wiggleTimer = null; }
}
function enterWiggle(card) {
  if (_wigglingCard && _wigglingCard !== card) _wigglingCard.classList.remove("wiggle");
  card.classList.add("wiggle");
  _wigglingCard = card;
  // 触觉反馈(支持的设备会震一下)
  if (navigator.vibrate) try { navigator.vibrate(30); } catch(e) {}
}
function bindCardInteractions(card) {
  let pressTimer = null;
  let startX = 0, startY = 0;
  let moved = false;
  let _ignoreNextClick = false;
  const LONG_PRESS_MS = 600;
  const MOVE_TOL = 8;

  const onStart = (clientX, clientY) => {
    moved = false;
    startX = clientX; startY = clientY;
    pressTimer = setTimeout(() => {
      enterWiggle(card);
      pressTimer = null;
    }, LONG_PRESS_MS);
  };
  const onMove = (clientX, clientY) => {
    if (!pressTimer) return;
    if (Math.abs(clientX - startX) > MOVE_TOL || Math.abs(clientY - startY) > MOVE_TOL) {
      moved = true;
      clearTimeout(pressTimer); pressTimer = null;
    }
  };
  const onEnd = () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    // 长按刚触发抖动时(pressTimer已在回调中清空)，屏蔽紧跟的 click，防止 wiggle 瞬间被退出
    if (card.classList.contains("wiggle")) {
      _ignoreNextClick = true;
      setTimeout(() => { _ignoreNextClick = false; }, 100);
    }
  };

  // 触摸
  card.addEventListener("touchstart", e => {
    if (e.target.classList.contains("del-x")) return;
    const t = e.touches[0]; onStart(t.clientX, t.clientY);
  }, { passive: true });
  card.addEventListener("touchmove", e => { const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: true });
  card.addEventListener("touchend", onEnd);
  card.addEventListener("touchcancel", onEnd);

  // 鼠标(桌面端长按也能进入,顺手)
  card.addEventListener("mousedown", e => {
    if (e.button !== 0) return;
    if (e.target.classList.contains("del-x")) return;
    onStart(e.clientX, e.clientY);
  });
  card.addEventListener("mousemove", e => onMove(e.clientX, e.clientY));
  card.addEventListener("mouseup", onEnd);
  card.addEventListener("mouseleave", onEnd);

  // 点击:抖动态下点 × 才能触发删除,点卡片其它地方就退出抖动而不是看详情
  card.addEventListener("click", e => {
    // 长按刚结束的那一下 click 不进详情
    if (moved) return;
    if (e.target.classList.contains("del-x")) {
      e.stopPropagation();
      delRental(card.dataset.id);   // 走原本带 confirm 的逻辑
      return;
    }
    if (card.classList.contains("wiggle")) {
      e.stopPropagation();
      // 长按刚触发的那次 click 不退出抖动，让用户有机会点 ×
      if (_ignoreNextClick) { _ignoreNextClick = false; return; }
      exitWiggle();
      return;
    }
    // 正常点击:看详情
    const id = card.dataset.id;
    const r = rentals.find(x => x.id === id);
    if (r) {
      map.setZoomAndCenter(15, [r.lng, r.lat], true);
      showInfo(id);
    }
  });
}

 *  A. 单点导航 — 调用高德地图导航
 * ======================================================== */
window.navTo = function(lng, lat, name) {
  // 手机端优先唤起高德 App，否则打开网页版
  const encoded = encodeURIComponent(name || "目的地");
  const appUrl  = `androidamap://navi?sourceApplication=bj-housing&lat=${lat}&lon=${lng}&dev=0&style=2&poiname=${encoded}`;
  const webUrl  = `https://uri.amap.com/navigation?to=${lng},${lat},${encoded}&mode=car&src=myapp&coordinate=gaode&callnative=1`;

  // 尝试唤起 App（移动端），3s 后如果没跳转则打开网页
  if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
    const t = Date.now();
    window.location.href = appUrl;
    setTimeout(() => {
      if (Date.now() - t < 3500) window.open(webUrl, "_blank");
    }, 2500);
  } else {
    window.open(webUrl, "_blank");
  }
};

/* ========================================================
 *  B. 多点路线规划
 * ======================================================== */
let routeStops  = [];   // [{id, lng, lat, name}]
let routePolyline = null;

window.toggleRoutePin = function(id, lng, lat, name) {
  const idx = routeStops.findIndex(s => s.id === id);
  if (idx >= 0) {
    routeStops.splice(idx, 1);
  } else {
    routeStops.push({ id, lng, lat, name });
  }
  renderRoutePanel();
  // 更新按钮文字 + class
  const btn = document.getElementById("pin-btn-" + id);
  const pinned = routeStops.some(s => s.id === id);
  if (btn) {
    btn.textContent = pinned ? "✅ 已加入" : "📍 加入路线";
    btn.classList.toggle("pinned", pinned);
  }
  // 加入路线时给个轻提示(手机更友好)
  if (pinned && typeof showTip === "function") showTip(`已加入路线 (共 ${routeStops.length} 站)`, 1500);
};

function renderRoutePanel() {
  const panel = document.getElementById("route-panel");
  const list  = document.getElementById("route-stops");
  if (!routeStops.length) {
    panel.style.display = "none";
    return;
  }
  panel.style.display = "";
  list.innerHTML = routeStops.map((s, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px">
      <span style="background:#2563eb;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">${i+1}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#374151">${escapeHtml(s.name)}</span>
      <button onclick="removeStop('${s.id}')" aria-label="移除" style="background:#fee2e2;border:none;cursor:pointer;color:#dc2626;font-size:16px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600">×</button>
    </div>
  `).join("");
}

window.removeStop = function(id) {
  routeStops = routeStops.filter(s => s.id !== id);
  // 恢复按钮文字 + class
  const btn = document.getElementById("pin-btn-" + id);
  if (btn) {
    btn.textContent = "📍 加入路线";
    btn.classList.remove("pinned");
  }
  renderRoutePanel();
  if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }
};

window.clearRoute = function() {
  if (!routeStops.length) return;
  if (!confirm(`清空路线规划 (${routeStops.length} 站)?`)) return;
  routeStops.forEach(s => {
    const btn = document.getElementById("pin-btn-" + s.id);
    if (btn) {
      btn.textContent = "📍 加入路线";
      btn.classList.remove("pinned");
    }
  });
  routeStops = [];
  renderRoutePanel();
  if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }
};

// 在地图上画折线连接各点（实际路径规划需要 AMap.Driving/Walking 插件）
window.planRoute = function() {
  if (routeStops.length < 2) { showTip("请至少选择 2 个地点", 2000); return; }
  if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }

  const path = routeStops.map(s => new AMap.LngLat(s.lng, s.lat));
  routePolyline = new AMap.Polyline({
    path,
    strokeColor: "#2563eb",
    strokeWeight: 4,
    strokeOpacity: 0.9,
    strokeStyle: "dashed",
    lineJoin: "round",
    map
  });

  // 自动缩放视野
  map.setFitView([ routePolyline, ...routeStops.map(s => new AMap.Marker({ position: [s.lng, s.lat] })) ]);
  showTip(`已连线 ${routeStops.length} 个地点，点"在高德地图中打开"查看精确路径`, 3000);
};

// 打开高德地图网页版多点路线
window.openAMapRoute = function() {
  if (routeStops.length < 2) { showTip("请至少选择 2 个地点", 2000); return; }
  const mode = document.getElementById("route-mode").value;
  const modeMap = { walking: "4", driving: "0", transit: "1" };

  // 高德 URI 格式：from=起点&to=终点&via=途经点1|途经点2
  const [from, ...rest] = routeStops;
  const to = rest[rest.length - 1];
  const vias = rest.slice(0, -1);

  let url = `https://uri.amap.com/navigation?from=${from.lng},${from.lat},${encodeURIComponent(from.name)}&to=${to.lng},${to.lat},${encodeURIComponent(to.name)}&mode=${modeMap[mode] || "0"}&src=myapp&coordinate=gaode&callnative=1`;
  if (vias.length) {
    url += "&via=" + vias.map(v => `${v.lng},${v.lat}`).join("|");
  }
  window.open(url, "_blank");
};

/* ========================================================
 *  通勤对比
 * ======================================================== */
window.toggleCommuteCompany = function(id, lng, lat, name) {
  id = String(id); lng = parseFloat(lng); lat = parseFloat(lat);
  const idx = commuteCompanies.findIndex(c => c.id === id);
  if (idx >= 0) {
    commuteCompanies.splice(idx, 1);
    showTip("已移除公司", 1200);
  } else {
    commuteCompanies.push({ id, lng, lat, name });
    showTip(`已选 ${commuteCompanies.length} 家公司，打开房源InfoWindow点 🏢 通勤 对比`, 2500);
  }
  renderCommutePanel();
};

function renderCommutePanel() {
  const panel = $("commute-panel");
  if (!commuteCompanies.length) { panel.style.display = "none"; return; }
  panel.style.display = "";
  $("commute-companies").innerHTML = commuteCompanies.map(c => `
    <div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px">
      <span style="background:#7c3aed;color:#fff;border-radius:4px;padding:1px 6px;flex-shrink:0;font-size:11px">🏢</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#374151">${escapeHtml(c.name)}</span>
      <button onclick="toggleCommuteCompany('${c.id}',${c.lng},${c.lat},'${escapeHtml(c.name)}')" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:16px;padding:0 2px;line-height:1;flex-shrink:0">×</button>
    </div>
  `).join("");
}

function fmtTime(seconds) {
  if (seconds == null) return "—";
  const mins = Math.round(seconds / 60);
  if (mins < 60) return `${mins}分`;
  return `${Math.floor(mins/60)}时${mins%60}分`;
}

function getRouteTime(fromLng, fromLat, toLng, toLat, mode) {
  return new Promise(resolve => {
    const origin = new AMap.LngLat(fromLng, fromLat);
    const dest   = new AMap.LngLat(toLng, toLat);
    if (mode === "transit") {
      const tf = new AMap.Transfer({ city: "北京", cityd: "北京" });
      tf.search(origin, dest, (status, result) => {
        resolve(status === "complete" && result.plans && result.plans.length ? result.plans[0].time : null);
      });
    } else if (mode === "riding") {
      const rd = new AMap.Riding();
      rd.search(origin, dest, (status, result) => {
        resolve(status === "complete" && result.routes && result.routes.length ? result.routes[0].time : null);
      });
    } else {
      const dr = new AMap.Driving();
      dr.search(origin, dest, (status, result) => {
        resolve(status === "complete" && result.routes && result.routes.length ? result.routes[0].time : null);
      });
    }
  });
}

window.showCommuteFor = async function(rentalId) {
  if (!commuteCompanies.length) { showTip("请先点击公司地点并选择「📊 通勤对比」", 2500); return; }
  // find rental in current or cached modes
  const r = rentals.find(x => x.id === rentalId)
    || (_modeCache["rent"] || []).find(x => x.id === rentalId)
    || (_modeCache["buy"]  || []).find(x => x.id === rentalId);
  if (!r) return;

  const panel = $("commute-panel");
  panel.style.display = "";
  $("commute-results").innerHTML = `<div style="color:#6b7280;font-size:12px;padding:6px 0;text-align:center">⏳ 计算中...</div>`;

  const rows = [];
  for (const c of commuteCompanies) {
    const [transit, riding, driving] = await Promise.all([
      getRouteTime(r.lng, r.lat, c.lng, c.lat, "transit"),
      getRouteTime(r.lng, r.lat, c.lng, c.lat, "riding"),
      getRouteTime(r.lng, r.lat, c.lng, c.lat, "driving"),
    ]);
    rows.push({ company: c.name, transit, riding, driving });
  }

  $("commute-results").innerHTML = `
    <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;background:#f3f4f6;padding:6px 8px;border-radius:6px">
      📍 ${escapeHtml(r.title)}
    </div>
    ${rows.map(row => `
      <div style="margin-bottom:8px;background:#faf5ff;border:1px solid #ede9fe;border-left:3px solid #7c3aed;border-radius:6px;padding:8px 10px">
        <div style="font-size:11px;color:#7c3aed;font-weight:600;margin-bottom:5px">→ ${escapeHtml(row.company)}</div>
        <div style="display:flex;gap:12px;font-size:12px;color:#374151">
          <span title="公交">🚇 ${fmtTime(row.transit)}</span>
          <span title="骑行">🚲 ${fmtTime(row.riding)}</span>
          <span title="驾车">🚗 ${fmtTime(row.driving)}</span>
        </div>
      </div>
    `).join("")}
  `;
  showTip("通勤时间计算完成", 1500);
};

window.clearCommutePanel = function() {
  commuteCompanies = [];
  renderCommutePanel();
  $("commute-results").innerHTML = `<div style="color:#9ca3af;font-size:12px;text-align:center;padding:6px 0">点击房源InfoWindow中的 🏢 通勤 按钮查看通勤时间</div>`;
};

</script>
